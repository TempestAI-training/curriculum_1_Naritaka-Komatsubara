# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Deploy FastAPI backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "final-backend/backend/**"
      - ".github/workflows/main_final-backend.yml"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  AZURE_WEBAPP_NAME: "final-backend"
  WORKING_DIRECTORY: "final-backend/backend"
  SLOT_NAME: "Production"
  STARTUP_COMMAND: "python3 -m gunicorn -w 2 -k uvicorn.workers.UvicornWorker --bind=0.0.0.0:8000 main:app"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate app import locally
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "from main import app; print(app)"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_49F791E645AE438EA091F11B8C2793BF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_300A26C65A4C4BA5A555376DA1D31199 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3F14D63C4CEF41A589F659F7F97178A4 }}

      - name: Configure App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          mask-inputs: false
          app-settings-json: |
            [
              {
                "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
                "value": "true",
                "slotSetting": false
              }
            ]
          general-settings-json: |
            {
              "linuxFxVersion": "PYTHON|3.11"
            }

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.WORKING_DIRECTORY }}
          startup-command: ${{ env.STARTUP_COMMAND }}